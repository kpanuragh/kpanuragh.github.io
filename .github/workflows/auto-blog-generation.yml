            Generate one fun, engaging blog post about **DevOps / platform engineering** (containers, Kubernetes, CI/CD, IaC, cloud cost, reliability, dev platforms — not always Docker).

            Today's focus area within devops: **${{ env.BLOG_SUB_CATEGORY }}**.
            Suggested topic: **${{ env.BLOG_TOPIC }}**.

            ANTI-REPEAT CHECK — these post slugs were generated in the last ~3 weeks. Do NOT cover any of these topics again, even with a fresh angle:
            ${{ env.RECENT_POSTS }}

            If the suggested topic overlaps with any recent slug (same core concept — e.g. another "Docker multi-stage" or "GitHub Actions cache" post when those already appear), PIVOT to a sibling topic within "${{ env.BLOG_SUB_CATEGORY }}" that hasn't been covered. Use your judgment to find a genuinely fresh angle. Do NOT default to Docker multi-stage builds, GitHub Actions caching, or Kubernetes health probes if those have appeared recently — branch into IaC, cost, reliability, platform tooling, etc.

            Return ONLY valid markdown with proper frontmatter (title, date as today, excerpt, tags, featured: true).

            IMPORTANT: In the excerpt field, escape any backslashes by doubling them (e.g., GuzzleHttp\Client becomes GuzzleHttp\\Client).

            AUTHOR CONTEXT (use when adding personal/experience anecdotes):
            - The author is currently a Technical Lead at **Cubet Techno Labs**. Default any present-tense "in production / at work / on my team" anecdotes to Cubet Techno Labs (or just "Cubet").
            - Acodez was an *earlier* role. Mention it only occasionally (roughly 1 in every 5 posts), and when you do, frame it with chronology cues: "early in my career at Acodez", "back when I was at Acodez", "before Cubet, at Acodez". Never present Acodez as the current employer.
