<script defer>
  function throttle(fn, wait) {
    var time = Date.now();
    return function () {
      var now = Date.now()
      if (time + wait - now < 0) {
        fn();
        time = now;
      }
    };
  }

  function scrollHandler() {
    const anchors = Array.from(document.querySelectorAll("body h2, body h3"));

    function scrollCallback() {
      var scrollTop = window.pageYOffset || document.documentElement.scrollTop;

      
      for (var i = 0; i < anchors.length; i++) {
        var anchorId = anchors[i].getAttribute("id");
        var link = document.querySelector(
          'nav ul li a[href="#' + anchorId + '"]',
        );
        if (link) {
          link.classList.remove("active-toc");
        }
      }

      
      for (var i = anchors.length - 1; i >= 0; i--) {
        var offsetTop = anchors[i].offsetTop;
        if (scrollTop > offsetTop - 75) {
          var anchorId = anchors[i].getAttribute("id");
          var link = document.querySelector(
            'nav ul li a[href="#' + anchorId + '"]',
          );
          if (link) {
            link.classList.add("active-toc");
            break;
          }
        }
      }
    }

    window.addEventListener(
      "scroll",
      throttle(scrollCallback, 300),
    );
  }
  setTimeout(scrollHandler, 100);
</script>

<script defer>
  function addCopyButtonToCodeBlocks() {
    
    const codeBlocks = document.querySelectorAll('code[class^="language-"]');

    codeBlocks.forEach((codeBlock) => {
      const copyButton = document.createElement("button");
      copyButton.classList.add("copy-code-button");
      copyButton.innerHTML = "copy";

      
      copyButton.addEventListener("click", () => {
        
        const elements = codeBlock.querySelectorAll(".cl");
        let codeToCopy = "";
        elements.forEach((element) => {
          codeToCopy += element.innerText;
        });
        navigator.clipboard.writeText(codeToCopy);

        
        copyButton.innerHTML = "copied!";
        setTimeout(() => {
          copyButton.innerHTML = "copy";
        }, 1500);
      });

      
      codeBlock.parentNode.before(copyButton);
    });
  }
  setTimeout(function () {
    addCopyButtonToCodeBlocks();
  }, 100);
</script>

        "content": "A lot of my friends have asked me, \u0026ldquo;Why do you love open source so much?\u0026rdquo; Honestly, for me, the answer is pretty simple: if something doesn’t work, I can fix it. That’s it. I mean, how great is that?\nAs a developer, I use tons of packages daily, many of which are built by other people. Of course, these packages aren’t always perfect—they might not follow the best coding practices, or they might have bugs. But here\u0026rsquo;s the thing: as long as the package meets my needs and doesn’t have any show-stopping bugs, I can use it.\nHowever, when something doesn’t work the way I need it to, open source gives me the freedom to take matters into my own hands. I can see the code and figure out how the developer tried to solve a problem. If it’s a small issue, I can fix it myself. I just fork the repo, make my changes, and submit a pull request (PR). Most of the time, they accept my changes, but even if they don’t, I can still use my version. And the best part? Others can benefit from my work too.\nLet me share a few examples that really highlight why I love open source. One day, I contributed to a project called NativePHP, which helps developers create desktop applications with Laravel. When NativePHP was launched at Laracon India, I was super excited to try it out. However, when I tested it on Linux, I found a bug—Linux PHP binaries weren’t downloading properly for Electron, and it wasn’t detecting the operating system’s architecture. I managed to fix it, submitted a PR, and now my code is part of NativePHP. It felt amazing to contribute and see my work integrated into something I cared about.\nAnother example is when I was using Waybar, a status bar for my Sway desktop environment on Linux. I love how customizable it is, but I wanted it to display Spotify album art, and at the time, it didn’t support this feature. I wasn’t an expert in C++, but I understood enough to dive into the code, make some changes, and submit a PR. About a week later, the changes were approved, and now I can see my Spotify album art on my status bar. I remember thinking, \u0026ldquo;Wow, I actually did that!\u0026rdquo;\nEven smaller contributions can be rewarding. I was using Khal, a terminal-based calendar utility, on Arch Linux and noticed that the installation instructions had issues. I forked the repo, fixed the documentation, and submitted a PR, which was quickly accepted. It wasn’t a massive change, but it still felt good knowing I helped improve the experience for others.\nNow, I’m not a full-time open source contributor by any means, but I use open source software every day. Whenever I find a bug or an issue, I try to fix it. And if I can’t, I report it, and someone else usually steps in to help. The thing is, with proprietary software, you’re stuck. You can’t see what’s going on behind the scenes. You can’t fix issues yourself—you just have to wait for the company to release a fix.\nBut with open source, you\u0026rsquo;re empowered. You can look at the code, understand how it works, fix bugs, and make improvements. If there’s a bug and you need an immediate fix, you don’t have to wait for the next release—you can just clone the repo, build the software yourself, and you’re good to go. That’s the beauty of it.\nOne of the best feelings in the open source world is getting your first PR accepted. It’s a small but powerful reminder that you contributed to something bigger than yourself. When you fix an issue, or make a meaningful change, and know that people around the world are using software with your contribution—it’s hard to describe how fulfilling that is. It’s like this quiet moment of achievement that stays with you.\n",
